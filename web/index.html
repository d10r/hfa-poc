<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Notification Demo</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    h2 { margin-top: 0; font-size: 1.1rem; color: #666; }
    button {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #3a7bc8; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.danger { background: #e74c3c; }
    button.danger:hover { background: #c0392b; }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .status.info { background: #d1ecf1; color: #0c5460; }
    .device-id {
      font-family: monospace;
      background: #eee;
      padding: 8px 12px;
      border-radius: 4px;
      word-break: break-all;
      margin: 8px 0;
    }
    .notification-item {
      border-left: 4px solid #4a90d9;
      padding-left: 12px;
      margin: 12px 0;
    }
    .notification-item.accepted { border-color: #27ae60; }
    .notification-item.rejected { border-color: #e74c3c; }
    .notification-item.pending { border-color: #f39c12; }
    .response-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .response-badge.accepted { background: #27ae60; color: white; }
    .response-badge.rejected { background: #e74c3c; color: white; }
    .response-badge.pending { background: #f39c12; color: white; }
    .timestamp { font-size: 0.85rem; color: #888; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Push Notification Demo</h1>
    <p>Register your device to receive push notifications. Accept button; tap the body or swipe away to reject.</p>
  </div>

  <div class="card" id="register-card">
    <h2>Device Registration</h2>
    <div id="agent-info" class="hidden">
      <p><strong>Pairing with Agent:</strong></p>
      <div class="device-id" id="agent-address"></div>
    </div>
    <p id="actions-support" class="timestamp"></p>
    <button id="register-btn" onclick="registerDevice()">Register for Push Notifications</button>
    <div id="register-status" class="status hidden"></div>
    <div id="device-info" class="hidden">
      <p><strong>Device ID:</strong></p>
      <div class="device-id" id="device-id"></div>
      <button class="danger" onclick="unregisterDevice()">Unregister Device</button>
    </div>
  </div>

  <div class="card">
    <h2>Notification History</h2>
    <button onclick="loadNotifications()">Refresh</button>
    <div id="notifications"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
